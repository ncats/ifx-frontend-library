  OR: [AgentHasAffiliationAggregateInput!]
  NOT: AgentHasAffiliationAggregateInput
  node: AgentHasAffiliationNodeAggregationWhereInput
}

input AgentHasAffiliationConnectionAggregateInput {
  count: ConnectionAggregationCountFilterInput
  AND: [AgentHasAffiliationConnectionAggregateInput!]
  OR: [AgentHasAffiliationConnectionAggregateInput!]
  NOT: AgentHasAffiliationConnectionAggregateInput
  node: AgentHasAffiliationNodeAggregationWhereInput
}

input AgentHasAffiliationConnectionFilters {
  """
  Return Agents where all of the related AgentHasAffiliationConnections match this filter
  """
  all: AgentHasAffiliationConnectionWhere

  """
  Return Agents where none of the related AgentHasAffiliationConnections match this filter
  """
